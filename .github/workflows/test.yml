name: Go Tests

on:
  push:
  pull_request:

jobs:
  # ── Unit tests ──────────────────────────────────────────────────────────────
  # These use fake repositories and require no database.
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Run unit tests
        run: go test $(go list ./... | grep -v /integration)
        
  # ── Integration tests ───────────────────────────────────────────────────────
  # Spins up a real Postgres container and runs the full suite with DATABASE_URL set.
  # Useful if you add tests that hit the database directly.
  integration:
    name: Integration Tests (Dockerised DB)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: shopping
          POSTGRES_PASSWORD: shopping
          POSTGRES_DB: shopping_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shopping -d shopping_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Run tests with database
        env:
          DATABASE_URL: postgres://shopping:shopping@localhost:5432/shopping_test?sslmode=disable
        run: go test ./integration
